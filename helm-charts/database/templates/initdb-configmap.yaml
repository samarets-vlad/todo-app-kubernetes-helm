apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS tasks (
      id INT AUTO_INCREMENT PRIMARY KEY,
      title VARCHAR(255) NOT NULL,
      completed TINYINT(1) DEFAULT 0,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE USER IF NOT EXISTS '{{ .Values.auth.user }}'@'%' IDENTIFIED BY '{{ .Values.auth.password }}';
    GRANT ALL PRIVILEGES ON {{ .Values.auth.database }}.* TO '{{ .Values.auth.user }}'@'%';
    FLUSH PRIVILEGES;
