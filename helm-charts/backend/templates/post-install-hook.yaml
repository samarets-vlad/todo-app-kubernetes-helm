apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "backend.fullname" . }}-init-tasks
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-backend
        image: busybox:1.36.1
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for backend..."
          until wget -qO- http://{{ include "backend.fullname" . }}:{{ .Values.service.port }}/api > /dev/null 2>&1; do
            echo "Backend not ready, retrying in 5s..."
            sleep 5
          done
          echo "Backend is ready!"
      containers:
      - name: init-tasks
        image: busybox:1.36.1
        command:
        - /bin/sh
        - -c
        - |
          BACKEND="http://{{ include "backend.fullname" . }}:{{ .Values.service.port }}/api"

          post_task() {
            wget -qO- --post-data="{\"task\":\"$1\"}" \
              --header="Content-Type: application/json" \
              $BACKEND
          }

          post_task "Welcome to Todo App! Start by adding your first task"
          post_task "Click 'Add' button or press Enter to create a task"
          post_task "Click 'Delete' to remove a task when done"
          post_task "Tasks are saved in MySQL database and persist on restart"

          echo "Initial tasks created!"
