prometheus:
  image:
    repository: prom/prometheus
    tag: "v2.48.1"
  scrapeInterval: "15s"
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

grafana:
  image:
    repository: grafana/grafana
    tag: "10.2.3"
  adminPassword: "admin123"
  allowSignUp: "false"
  service:
    type: NodePort
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

loki:
  image:
    repository: grafana/loki
    tag: "2.9.3"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

promtail:
  image:
    repository: grafana/promtail
    tag: "2.9.3"

nodeExporter:
  image:
    repository: prom/node-exporter
    tag: "v1.7.0"

blackboxExporter:
  image:
    repository: prom/blackbox-exporter
    tag: "v0.24.0"

certManager:
  enabled: true
  email: "v.mediocrity@gmail.com"
  issuerName: "letsencrypt-prod"
